erddap:
  server: "https://coastwatch.pfeg.noaa.gov/erddap"

datasets:
  chlorophyll:
    default: "erdMH1chla8day_R202SQ"
    on_demand:
      viirs_750m_npac: "erdVHNchla1day"      # 750m, solo Pacífico Norte (lon <= -110)
      viirs_750m_8day: "erdVHNchla8day"      # 750m, 8-day, solo Pacífico Norte
  sst:
    default: "ncdcOisst21Agg_LonPM180"
    on_demand:
      mur_1km: "jplMURSST41"
      mur_anomaly: "jplMURSST41anom1day"

regions:
  pacific_mexico:
    bbox: [-118, -84, 14, 32]   # [lon_min, lon_max, lat_min, lat_max]
  gulf_mexico:
    bbox: [-98, -81, 18, 31]

sync:
  interval_days: 14
  cache_ttl_days: 7
  default_regions:
    - pacific_mexico
    - gulf_mexico
